name: IBKR Validate Connection

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    env:
      PYTHON_BIN: ${{ vars.PYTHON_BIN || 'python3' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          "$PYTHON_BIN" -m venv --clear .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install --upgrade --upgrade-strategy eager -e .
      - name: Validate IBKR paper connection
        env:
          BROKER: ibkr
          DRY_RUN: "true"
          IBKR_HOST: ${{ vars.IBKR_HOST || '127.0.0.1' }}
          IBKR_PORT: ${{ vars.IBKR_PORT || '7497' }}
          IBKR_CLIENT_ID: ${{ vars.IBKR_CLIENT_ID || '37' }}
          IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
          QSENTIA_ARTIFACT_DIR: ${{ vars.QSENTIA_ARTIFACT_DIR || 'artifacts/current' }}
        run: .venv/bin/python scripts/validate_ibkr.py
