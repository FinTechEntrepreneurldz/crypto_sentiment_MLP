name: IBKR Validate Connection

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Validate IBKR paper connection
        env:
          BROKER: ibkr
          DRY_RUN: "true"
          IBKR_HOST: ${{ vars.IBKR_HOST || '127.0.0.1' }}
          IBKR_PORT: ${{ vars.IBKR_PORT || '7497' }}
          IBKR_CLIENT_ID: ${{ vars.IBKR_CLIENT_ID || '37' }}
          IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
          QSENTIA_ARTIFACT_DIR: ${{ vars.QSENTIA_ARTIFACT_DIR || 'artifacts/current' }}
        run: python scripts/validate_ibkr.py
