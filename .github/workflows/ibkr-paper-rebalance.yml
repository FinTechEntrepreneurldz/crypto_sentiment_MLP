name: IBKR Paper Rebalance

on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  rebalance:
    runs-on: self-hosted
    env:
      PYTHON_BIN: ${{ vars.PYTHON_BIN || '/Library/Frameworks/Python.framework/Versions/3.12/bin/python3' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c 'import sys; print(sys.executable); print(sys.version); assert sys.version_info >= (3, 11), "Python 3.11+ is required for torch>=2.4 on this runner"'
          "$PYTHON_BIN" -m venv --clear .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install --upgrade --upgrade-strategy eager -e ".[nlp]"
      - name: Optional import artifact zip
        env:
          QSENTIA_ARTIFACT_ZIP: ${{ vars.QSENTIA_ARTIFACT_ZIP }}
          QSENTIA_LIVE_STATE_ZIP: ${{ vars.QSENTIA_LIVE_STATE_ZIP }}
        run: |
          if [ -n "${QSENTIA_ARTIFACT_ZIP:-}" ] && [ -f "$QSENTIA_ARTIFACT_ZIP" ]; then
            .venv/bin/python scripts/import_artifacts.py "$QSENTIA_ARTIFACT_ZIP"
          fi
          if [ -n "${QSENTIA_LIVE_STATE_ZIP:-}" ] && [ -f "$QSENTIA_LIVE_STATE_ZIP" ]; then
            .venv/bin/python scripts/import_live_state.py "$QSENTIA_LIVE_STATE_ZIP"
          fi
      - name: Verify artifacts
        env:
          QSENTIA_ARTIFACT_DIR: ${{ vars.QSENTIA_ARTIFACT_DIR || 'artifacts/current' }}
        run: .venv/bin/python scripts/verify_artifacts.py
      - name: Check live text sources
        env:
          LIVE_TEXT_MIN_ROWS: ${{ vars.LIVE_TEXT_MIN_ROWS || '5' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ENABLE_YOUTUBE_API: ${{ vars.ENABLE_YOUTUBE_API || 'true' }}
          REQUIRE_YOUTUBE_LIVE_TEXT: ${{ vars.REQUIRE_YOUTUBE_LIVE_TEXT || 'true' }}
          YOUTUBE_MIN_ROWS: ${{ vars.YOUTUBE_MIN_ROWS || '5' }}
          YOUTUBE_MAX_SEARCH_CALLS_PER_RUN: ${{ vars.YOUTUBE_MAX_SEARCH_CALLS_PER_RUN || '2' }}
          YOUTUBE_MAX_RESULTS_PER_CALL: ${{ vars.YOUTUBE_MAX_RESULTS_PER_CALL || '25' }}
          YOUTUBE_MAX_ROWS: ${{ vars.YOUTUBE_MAX_ROWS || '40' }}
          YOUTUBE_QUERIES: ${{ vars.YOUTUBE_QUERIES }}
        run: .venv/bin/python scripts/check_live_text.py --min-rows "$LIVE_TEXT_MIN_ROWS" --youtube-min-rows "$YOUTUBE_MIN_ROWS"
      - name: Run paper rebalance
        env:
          BROKER: ibkr
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          QSENTIA_ARTIFACT_DIR: ${{ vars.QSENTIA_ARTIFACT_DIR || 'artifacts/current' }}
          IBKR_HOST: ${{ vars.IBKR_HOST || '127.0.0.1' }}
          IBKR_PORT: ${{ vars.IBKR_PORT || '7497' }}
          IBKR_CLIENT_ID: ${{ vars.IBKR_CLIENT_ID || '37' }}
          IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
          TARGET_GROSS_FRACTION: ${{ vars.TARGET_GROSS_FRACTION || '0.90' }}
          MAX_CONTRACTS: ${{ vars.MAX_CONTRACTS || '150' }}
          FLATTEN_ON_LOW_CONFIDENCE: ${{ vars.FLATTEN_ON_LOW_CONFIDENCE || 'false' }}
          ALLOW_SHORT: "true"
          LIVE_TEXT_MIN_ROWS: ${{ vars.LIVE_TEXT_MIN_ROWS || '5' }}
          ALLOW_LOW_LIVE_TEXT: ${{ vars.ALLOW_LOW_LIVE_TEXT || 'false' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ENABLE_YOUTUBE_API: ${{ vars.ENABLE_YOUTUBE_API || 'true' }}
          REQUIRE_YOUTUBE_LIVE_TEXT: ${{ vars.REQUIRE_YOUTUBE_LIVE_TEXT || 'true' }}
          YOUTUBE_MIN_ROWS: ${{ vars.YOUTUBE_MIN_ROWS || '5' }}
          YOUTUBE_MAX_SEARCH_CALLS_PER_RUN: ${{ vars.YOUTUBE_MAX_SEARCH_CALLS_PER_RUN || '2' }}
          YOUTUBE_MAX_RESULTS_PER_CALL: ${{ vars.YOUTUBE_MAX_RESULTS_PER_CALL || '25' }}
          YOUTUBE_MAX_ROWS: ${{ vars.YOUTUBE_MAX_ROWS || '40' }}
          YOUTUBE_QUERIES: ${{ vars.YOUTUBE_QUERIES }}
          ENABLE_BTC_SHOCK_OVERRIDE: ${{ vars.ENABLE_BTC_SHOCK_OVERRIDE || 'true' }}
          BTC_CRASH_RET_24H_THRESHOLD: ${{ vars.BTC_CRASH_RET_24H_THRESHOLD || '-0.025' }}
          BTC_CRASH_RET_5D_THRESHOLD: ${{ vars.BTC_CRASH_RET_5D_THRESHOLD || '-0.04' }}
          BTC_RALLY_RET_24H_THRESHOLD: ${{ vars.BTC_RALLY_RET_24H_THRESHOLD || '0.025' }}
          BTC_RALLY_RET_5D_THRESHOLD: ${{ vars.BTC_RALLY_RET_5D_THRESHOLD || '0.04' }}
          BTC_CRASH_OVERRIDE_CONFIDENCE: ${{ vars.BTC_CRASH_OVERRIDE_CONFIDENCE || '0.12' }}
          BTC_RALLY_OVERRIDE_CONFIDENCE: ${{ vars.BTC_RALLY_OVERRIDE_CONFIDENCE || '0.12' }}
        run: .venv/bin/python scripts/run_rebalance.py --submit
      - name: Commit dashboard logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/portfolio/portfolio.csv
          git add logs/decisions/latest_decision.csv logs/decisions/decisions.csv
          git add logs/target_weights/latest_target_weights.csv logs/target_weights/target_weights.csv
          git add logs/positions/latest_positions.csv
          git add logs/orders/latest_planned_orders.csv logs/orders/latest_submitted_orders.csv
          if [ -f logs/orders/submitted_orders.csv ]; then
            git add logs/orders/submitted_orders.csv
          fi
          git add logs/health/health_status.json logs/health/signal_history.csv
          if git diff --cached --quiet; then
            echo "No dashboard log changes to commit."
          else
            git commit -m "Update dashboard logs [skip ci]"
            git push
          fi
